<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Login to your Login Results Portal account">
  <title>Teachers -results Page</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <nav class="container">
      <div class="logo">Teachers Results Page</div>
    </nav>
  </header>

  <div class="form-container">
    <h2 style="text-align: center; margin-bottom: 30px;">Enter Student Results</h2>
    <form id="loginForm" action="/results" method="POST">
      <div class="form-group">
        <label>Student Number</label>
        <input type="text" name="stdnumber" placeholder="Enter your student ID" required>
        <div class="error"></div>
      </div>

       <div class="form-group">
        <label>Name</label>
        <input type="text" name="fullname" placeholder="Student Fullname" required>
        <div class="error"></div>
      </div>

      <div class="form-group">
        <label>Class</label>
        <input type="text" name="Class" placeholder="Enter Class" required>
        <div class="error"></div>
      </div>

       <div class="form-group">
        <label>Maths score</label>
        <input type="number" name="maths" placeholder="Enter Score" required>
        <div class="error"></div>
      </div>

       <div class="form-group">
        <label>English Score</label>
        <input type="number" name="english" placeholder="Enter Score" required>
        <div class="error"></div>
      </div>

       <div class="form-group">
        <label>Total</label>
        <input type="number" name="total" placeholder="Enter Total Score" required>
        <div class="error"></div>
      </div>

       <div class="form-group">
        <label>Position</label>
        <input type="number" name="Position" placeholder="Enter Position" required>
        <div class="error"></div>
      </div>

       <div class="form-group">
        <label>Out Of</label>
        <input type="number" name="outof" placeholder="Enter Environment" required>
        <div class="error"></div>
      </div>

      <button type="submit" class="btn" style="width: 100%; margin-top: 20px;">Send</button>
    </form>
       <p style="text-align: center; margin-top: 20px;">
      View student Portal? <a href="index.html">View here</a>
    </p>
  </div>
</body>
</html>
